<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario de Dietas</title>
    <script>
      // SPA redirect: preserve the path and reload from index.html
      sessionStorage.redirect = location.href
    </script>
    <meta http-equiv="refresh" content="0;URL='/calendario-dietas/'" />
  </head>
  <body>
    <script>
      // If the meta redirect didn't work, try JS redirect
      if (sessionStorage.redirect) {
        location.href = '/calendario-dietas/'
      }
    </script>
  </body>
</html>
